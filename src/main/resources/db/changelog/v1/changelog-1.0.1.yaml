databaseChangeLog:
  - changeSet:
      id: 2
      author: islam
      changes:
        - createTable:
            tableName: hashTables
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: size
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: threshold
                  type: int
                  constraints:
                    nullable: false
        - createTable:
            tableName: entries
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: key
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: nvarchar(50)
                  constraints:
                    nullable: false
